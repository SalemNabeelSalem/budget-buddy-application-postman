$kind: http-request
description: >-
  ## Get Current User Profile


  Retrieves the profile information of the currently authenticated user.


  ### Authentication


  Requires a valid Bearer token. The token is inherited from the
  collection-level authorization.


  ```

  Authorization: Bearer {{token}}

   ```

  ### Response


  **200 OK**


  Returns the authenticated user's profile object.


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | Unique identifier of the user |

  | `fullName` | string | Full name of the user |

  | `email` | string | Email address of the user |

  | `password` | null | Password is never returned |

  | `profileImageUrl` | string | URL of the user's profile image (hosted on
  Cloudinary) |

  | `createdAt` | string (ISO 8601) | Timestamp when the account was created |

  | `updatedAt` | string (ISO 8601) | Timestamp when the account was last
  updated |


  **Example Response:**


  ``` json

  {
    "id": 57,
    "fullName": "Salem Nabil Salem",
    "email": "isalemnabeelsalem@gmail.com",
    "password": null,
    "profileImageUrl": "http://res.cloudinary.com/...",
    "createdAt": "2026-03-02T01:06:06",
    "updatedAt": "2026-03-02T01:06:26"
  }

   ```

  ### Error Responses


  | Status | Description |

  | --- | --- |

  | `401 Unauthorized` | Missing or invalid Bearer token |

  | `403 Forbidden` | Token is expired or lacks required permissions |
url: "{{budget-buddy-backend-development}}/api/{{version}}/profile/me"
method: GET
order: 4000
