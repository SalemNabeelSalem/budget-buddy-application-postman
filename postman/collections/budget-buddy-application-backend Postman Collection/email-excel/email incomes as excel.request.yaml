$kind: http-request
description: >-
  ## Email Incomes as Excel


  Sends an Excel file containing all income records for the authenticated user's
  profile to their registered email address. This is useful for exporting and
  archiving income data in a spreadsheet format.


  ---


  ### Authentication


  Uses **Bearer token** inherited from the collection. Ensure a valid token is
  set before sending the request.


  ---


  ### Variables Used


  | Variable | Description |

  | --- | --- |

  | `{{budget-buddy-backend-development}}` | Base URL for the development
  environment |

  | `{{version}}` | API version (e.g., `v1.0`) |


  ---


  ### Example Request


  ```

  GET {{budget-buddy-backend-development}}/api/{{version}}/email/excel-incomes

   ```

  ---


  ### Response


  Triggers an email to the authenticated user's registered address containing an
  Excel (.xlsx) file with all income records.


  **Success —** **`200 OK`**


  ``` json

  {
    "message": "Incomes Excel report has been sent to your email successfully."
  }

   ```

  **Unauthorized —** **`401 Unauthorized`**


  Returned when the Bearer token is missing or invalid.


  ``` json

  {
    "error": "Unauthorized"
  }

   ```
url: "{{budget-buddy-backend-development}}/api/{{version}}/email/excel-incomes"
method: GET
order: 1000
