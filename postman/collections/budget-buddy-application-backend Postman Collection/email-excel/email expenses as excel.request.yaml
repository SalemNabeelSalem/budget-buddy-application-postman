$kind: http-request
description: >-
  ## Email Expenses as Excel


  Generates an Excel report of all expenses and sends it to the configured
  recipient's email address.


  ---


  ### Endpoint


  | Property | Value |

  |----------|-------|

  | **Method** | `GET` |

  | **Endpoint Path** | `/api/{{version}}/email/excel-expenses` |

  | **Full URL** |
  `{{budget-buddy-backend-development}}/api/{{version}}/email/excel-expenses` |


  ### URL Variables


  | Variable | Description |

  |----------|-------------|

  | `{{budget-buddy-backend-development}}` | Base URL for the development
  environment of the Budget Buddy backend |

  | `{{version}}` | API version (e.g., `v1`) |


  ---


  ### Response


  **200 OK**


  Returns a confirmation message indicating that the Excel report has been
  successfully sent.


  ```json

  {
    "message": "Expenses Excel report has been sent to ..."
  }

  ```


  > **Note:** The `message` field confirms delivery and typically includes the
  recipient's email address in the full response.
url: "{{budget-buddy-backend-development}}/api/{{version}}/email/excel-expenses"
method: GET
