$kind: http-request
description: >-
  ## Filter Expenses by Date Range


  Retrieves a filtered list of expense records within a specified date range.
  Use the `start-date` and `end-date` query parameters to narrow down results to
  a particular period. Returns all matching expenses sorted by date in
  descending order.


  ---


  ## Endpoint


  ```

  GET {{budget-buddy-backend-development}}/api/{{version}}/expenses/filters

   ```

  ---


  ## Query Parameters


  | Parameter | Type | Required | Description | Example |

  | --- | --- | --- | --- | --- |

  | `start-date` | string | Yes | The start of the date range (inclusive,
  `YYYY-MM-DD`) | `2026-01-01` |

  | `end-date` | string | Yes | The end of the date range (inclusive,
  `YYYY-MM-DD`) | `2026-04-01` |


  ---


  ## Authentication


  This request inherits **Bearer Token** authentication from the collection
  level. Ensure the token is set in the `budget-buddy-application` environment
  or at the collection level before sending the request.


  ```

  Authorization: Bearer {{token}}

   ```

  ---


  ## Response


  ### Response Fields


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | Unique identifier of the expense record |

  | `name` | string | Descriptive name of the expense |

  | `icon` | string | Emoji icon associated with the expense |

  | `date` | string | Date of the expense (`YYYY-MM-DD`) |

  | `amount` | number | Monetary amount of the expense |

  | `categoryId` | integer | Unique identifier of the associated category |

  | `categoryName` | string | Name of the associated category |

  | `createdAt` | string | Timestamp when the record was created (ISO 8601) |

  | `updatedAt` | string | Timestamp when the record was last updated (ISO 8601)
  |


