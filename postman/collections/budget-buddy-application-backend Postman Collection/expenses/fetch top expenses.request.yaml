$kind: http-request
description: >
  
  Retrieves the top N expenses from the Budget Buddy application, ordered by
  amount in descending order. Use the `limit` query parameter to control how
  many results are returned.


  ---


  ### Query Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `limit` | integer | Yes | The maximum number of top expenses to return.
  Example: `5` |


  ---


  ### Response Fields


  | Field | Type | Description |

  |-------|------|-------------|

  | `id` | integer | Unique identifier of the expense |

  | `name` | string | Descriptive name of the expense |

  | `icon` | string | Emoji icon associated with the expense |

  | `date` | string (date) | Date of the expense in `YYYY-MM-DD` format |

  | `amount` | number | Monetary amount of the expense |

  | `categoryId` | integer | Unique identifier of the expense category |

  | `categoryName` | string | Name of the expense category |

  | `createdAt` | string (datetime) | Timestamp when the record was created |

  | `updatedAt` | string (datetime) | Timestamp when the record was last updated
  |


  ---


  ### Sample Response (200 OK)


  ```json

  [
    {
      "id": 7,
