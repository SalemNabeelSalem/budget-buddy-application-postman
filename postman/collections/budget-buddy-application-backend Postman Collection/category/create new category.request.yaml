$kind: http-request
description: >-
  ## Create New Category


  Creates a new category for a user's budget profile. Categories are used to
  classify transactions as either income or expenses, and can optionally include
  an icon identifier.


  ## Request Body


  The request body must be sent as JSON with the following fields:


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `type` | string | Yes | The category type. Accepted values: `"income"` or
  `"expense"`. |

  | `name` | string | Yes | The name of the category (e.g., `"water"`,
  `"rent"`). |

  | `icon` | string | No | An optional icon identifier for the category. Pass an
  empty string if not used. |


  **Example:**


  ``` json

  {
    "type": "expense",
    "name": "water",
    "icon": ""
  }

   ```

  ## Response


  ### 201 Created


  Returned when the category is successfully created.


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | number | The unique ID of the created category. |

  | `profileId` | number | The ID of the user profile this category belongs to.
  |

  | `name` | string | The name of the category. |

  | `icon` | string | The icon identifier. |

  | `type` | string | The category type (`"income"` or `"expense"`). |

  | `createdDate` | string (ISO 8601) | Timestamp when the category was created.
  |

  | `updatedDate` | string (ISO 8601) | Timestamp when the category was last
  updated. |


  **Example:**


  ``` json

  {
    "id": 14,
    "profileId": 57,
    "name": "water",
    "icon": "",
    "type": "expense",
    "createdDate": "2026-03-08T15:17:08.302",
    "updatedDate": "2026-03-08T15:17:08.302"
  }

   ```
