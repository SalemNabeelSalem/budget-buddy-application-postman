$kind: http-request
description: >-
  Filters and retrieves a list of **expenses** or **incomes** based on the
  provided criteria such as type, name, date range, and sorting preferences.


  ## Request Body


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `type` | string | Yes | The record type to filter. Accepted values:
  `expense`, `income` |

  | `name` | string | No | Partial or full name to search within records |

  | `sortBy` | string | No | Field to sort results by. Accepted values:
  `amount`, `name`, `date` |

  | `startDate` | string (date) | No | Start of the date range in `YYYY-MM-DD`
  format |

  | `endDate` | string (date) | No | End of the date range in `YYYY-MM-DD`
  format |

  | `direction` | string | No | Sort direction. Accepted values: `ASC`, `DESC` |


  ## Example Request Body


  ``` json

  {
      "type": "expense",
      "name": "transportation",
      "sortBy": "amount",
      "startDate": "2026-01-01",
      "endDate": "2026-06-01",
      "direction": "DESC"
  }

   ```

  ## Example Response


  Returns an array of matching records sorted by the specified field and
  direction.


  ``` json

  [
    {
      "id": 7,
      "name": "transportation to work daily month-03",
      "icon": "🚍",
      "date": "2026-03-30",
      "amount": 500,
      "categoryId": 6,
      "categoryName": "transportations",
      "createdAt": "2026-03-23T21:13:05",
      "updatedAt": "2026-03-23T21:13:05"
    },
    {
      "id": 9,
      "name": "transportation to work daily month-02",
      "icon": "🚍",
      "date": "2026-02-28",
      "amount": 200,
      "categoryId": 6,
      "categoryName": "transportations",
      "createdAt": "2026-03-23T22:55:20",
      "updatedAt": "2026-03-23T22:55:20"
    }
  ]

   ```

  ## Response Fields


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | Unique identifier of the record |

  | `name` | string | Name/title of the expense or income entry |

  | `icon` | string | Emoji icon associated with the entry |

  | `date` | string (date) | Date of the transaction in `YYYY-MM-DD` format |

  | `amount` | number | Monetary amount of the transaction |

  | `categoryId` | integer | ID of the category this entry belongs to |

  | `categoryName` | string | Name of the category |

  | `createdAt` | string (datetime) | Timestamp when the record was created |

  | `updatedAt` | string (datetime) | Timestamp when the record was last updated
  |
url: "{{budget-buddy-backend-development}}/api/{{version}}/filters"
method: POST
