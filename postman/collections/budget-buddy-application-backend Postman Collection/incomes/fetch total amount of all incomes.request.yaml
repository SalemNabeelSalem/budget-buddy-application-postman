$kind: http-request
description: >-
  ## Fetch Total Amount of All Incomes


  Retrieves the total sum of all income records associated with the
  authenticated user's profile. This is a summary endpoint useful for displaying
  aggregate income data on dashboards or financial overviews.


  ---


  ### Authentication


  This request inherits **Bearer token** authentication from the collection.
  Ensure a valid token is set at the collection level before sending this
  request.


  ---


  ### Endpoint


  `GET /api/{{version}}/incomes/summary/total`


  ---


  ### Path / URL Variables


  | Variable | Description |

  |---|---|

  | `budget-buddy-backend-development` | Base URL of the development backend
  server |

  | `version` | API version (e.g., `v1.0`) |


  ---


  ### Request Body


  None — this is a `GET` request and does not require a request body.


  ---


  ### Response


  **Status:** `200 OK`


  Returns a JSON object containing the total income amount across all records
  for the authenticated user.


  **Example Response:**


  ```json

  {
    "totalIncomes": 27100
  }

  ```


  | Field | Type | Description |

  |---|---|---|

  | `totalIncomes` | `number` | The sum of all income amounts for the user's
  profile |


  ---


  ### Notes


  - The total is computed across **all** income records regardless of date,
  category, or type.

  - To get a filtered total (e.g., by date range), use the **filter by date
  range** endpoint instead.
url: "{{budget-buddy-backend-development}}/api/{{version}}/incomes/summary/total"
method: GET
order: 5000
