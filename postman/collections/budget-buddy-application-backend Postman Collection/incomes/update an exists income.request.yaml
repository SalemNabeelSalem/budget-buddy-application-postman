$kind: http-request
description: >-
  ## Update an Existing Income


  Updates the details of an existing income record identified by its unique
  `id`. All fields in the request body will overwrite the current values stored
  for that income entry.


  ---


  ### Authentication


  This request inherits **Bearer Token** authentication from the parent
  collection. Ensure a valid token is set at the collection level before sending
  the request.


  ```

  Authorization: Bearer {{token}}

   ```

  ---


  ### Path Parameter


  | Parameter | Type | Required | Description |

  | --- | --- | --- | --- |

  | `id` | integer | Yes | The unique identifier of the income record to update.
  Example: `26` |


  **Example URL:**


  ```

  PUT {{budget-buddy-backend-development}}/api/{{version}}/incomes/26

   ```

  ---


  ### Request Body


  Content-Type: `application/json`


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `name` | string | Yes | A descriptive label for the income entry (e.g.
  `"salary month-06"`) |

  | `icon` | string | Yes | An emoji or icon representing the income category
  (e.g. `"🗓️"`) |

  | `date` | string | Yes | The date of the income in `YYYY-MM-DD` format (e.g.
  `"2026-06-30"`) |

  | `amount` | integer | Yes | The monetary value of the income (e.g. `4300`) |

  | `categoryId` | integer | Yes | The ID of the category this income belongs to
  (e.g. `20`) |


  **Sample Request Body:**


  ``` json

  {
    "name": "salary month-06",
    "icon": "🗓️",
    "date": "2026-06-30",
    "amount": 4300,
    "categoryId": 20
  }

   ```

  ---


  ### Response


  #### 200 OK


  Returns the updated income object with all current field values.


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | The unique identifier of the income record |

  | `name` | string | The name/label of the income entry |

  | `icon` | string | The emoji or icon associated with the income |

  | `date` | string | The date of the income in `YYYY-MM-DD` format |

  | `amount` | integer | The monetary value of the income |

  | `categoryId` | integer | The ID of the associated category |

  | `categoryName` | string | The name of the associated category |

  | `createdAt` | string | ISO 8601 timestamp of when the record was originally
  created |

  | `updatedAt` | string | ISO 8601 timestamp of the most recent update |


  **Sample Success Response (200 OK):**


  ``` json

  {
    "id": 26,
    "name": "salary month-06",
    "icon": "🗓️",
    "date": "2026-06-30",
    "amount": 4300,
    "categoryId": 20,
    "categoryName": "salarys",
    "createdAt": "2026-03-21T20:22:43",
    "updatedAt": "2026-03-21T21:58:15"
  }

   ```
