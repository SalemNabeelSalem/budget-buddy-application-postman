$kind: http-request
description: >-
  ## Create New Income


  Creates a new income record in the system. Accepts income details in the
  request body and returns the newly created income object upon success.


  ---


  ### Authentication


  This request requires a **Bearer Token**. The token is inherited from the
  collection-level auth configuration.


  ```

  Authorization: Bearer {{token}}

   ```

  ---


  ### Request Details


  | Property | Value |

  | --- | --- |

  | **Method** | `POST` |

  | **URL** | `http://localhost:8080/api/v1.0/incomes/create` |

  | **Content-Type** | `application/json` |


  ---


  ### Request Body


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `name` | string | Yes | Descriptive name of the income entry |

  | `icon` | string | No | Icon identifier associated with the income (can be
  empty) |

  | `date` | string | Yes | Date of the income in `YYYY-MM-DD` format |

  | `categoryId` | integer | Yes | ID of the category this income belongs to |

  | `amount` | number | Yes | Monetary value of the income |


  #### Sample Request Body


  ``` json

  {
      "name": "salary month-02",
      "icon": "",
      "date": "2026-02-28",
      "categoryId": 20,
      "amount": 4000
  }

   ```

  ---


  ### Response


  Returns a `201 Created` with the newly created income object.


  #### Response Fields


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | integer | Unique identifier of the income record |

  | `name` | string | Descriptive name of the income entry |

  | `icon` | string | Icon identifier associated with the income (can be empty)
  |

  | `date` | string | Date of the income in `YYYY-MM-DD` format |

  | `amount` | number | Monetary value of the income |

  | `categoryId` | integer | ID of the category this income belongs to |

  | `categoryName` | string | Name of the associated income category |

  | `createdAt` | string | Timestamp when the record was created (ISO 8601) |

  | `updatedAt` | string | Timestamp when the record was last updated (ISO 8601)
  |


  ---


  ### Sample Response — 201 Created


  ``` json

  {
    "id": 6,
    "name": "salary month-02",
    "icon": "",
    "date": "2026-02-28",
    "amount": 4000,
    "categoryId": 20,
    "categoryName": "salary",
    "createdAt": "2026-03-15T15:41:37",
    "updatedAt": "2026-03-15T15:41:37"
  }

   ```
