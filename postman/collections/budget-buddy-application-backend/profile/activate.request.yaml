$kind: http-request
description: >-
  ## Activate Account


  Activates a newly registered user account using the verification token sent to
  the user's email after registration.


  This endpoint is typically called when the user clicks the activation link in
  their confirmation email. The token is single-use and will be invalidated
  after a successful activation.


  ### Authentication


  No authentication required. This endpoint is public.


  ### Query Parameters


  | Parameter | Type | Required | Description |

  | --- | --- | --- | --- |

  | `token` | string | Yes | The activation token received in the registration
  confirmation email. |


  ### Responses


  | Status | Description |

  | --- | --- |

  | `200` | profile activated successfully. |

  | `404` | activation token not found or has already been used. |


  ### Notes


  - The token is generated during registration (see the `register` request in
  the same `profile` folder).
      
  - Each token can only be used once. Attempting to reuse a token will result in
  a `404` response.
      
  - If the token has expired or is invalid, a new registration may be required.
