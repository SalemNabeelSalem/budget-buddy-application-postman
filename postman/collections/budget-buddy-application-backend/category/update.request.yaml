$kind: http-request
description: >-
  Updates an existing category for a user's budget profile. Categories are used
  to classify transactions as either income or expenses, and can optionally
  include an icon identifier. Authentication is inherited from the collection
  (Bearer token).


  ## Path Parameters


  | Parameter | Type | Required | Description |

  | --- | --- | --- | --- |

  | `id` | number | Yes | The unique ID of the category to update (e.g., `24`).
  |


  ## Request Body


  The request body must be sent as JSON with the following fields:


  | Field | Type | Required | Description |

  | --- | --- | --- | --- |

  | `type` | string | Yes | The category type. Accepted values: `"income"` or
  `"expense"`. |

  | `name` | string | Yes | The name of the category (e.g., `"overtime"`,
  `"rent"`). |

  | `icon` | string | No | An optional icon identifier for the category. Pass an
  empty string if not used. |


  **Example:**


  ``` json

  {
    "name": "overtime",
    "type": "income",
    "icon": "💵"
  }

  ```


  ## Response


  ### 200 OK


  Returned when the category is successfully updated.


  | Field | Type | Description |

  | --- | --- | --- |

  | `id` | number | The unique ID of the updated category. |

  | `profileId` | number | The ID of the user profile this category belongs to.
  |

  | `name` | string | The updated name of the category. |

  | `icon` | string | The icon identifier. |

  | `type` | string | The category type (`"income"` or `"expense"`). |

  | `createdDate` | string (ISO 8601) | Timestamp when the category was
  originally created. |

  | `updatedDate` | string (ISO 8601) | Timestamp when the category was last
  updated. |


  **Example:**


  ``` json

  {
    "id": 24,
    "profileId": 57,
    "name": "overtime",
    "icon": "💵",
    "type": "income",
    "createdDate": "2026-03-14T00:36:24",
    "updatedDate": "2026-03-14T00:36:24"
  }

  ```
url: "{{budget-buddy-backend-development}}/api/v1.0/category/24"
method: PUT
