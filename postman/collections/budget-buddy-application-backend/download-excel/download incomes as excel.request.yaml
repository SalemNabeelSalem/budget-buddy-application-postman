$kind: http-request
description: >-
  ## Download Incomes as Excel


  Exports all income records associated with the authenticated user's profile as
  a downloadable Excel (`.xlsx`) file. This is useful for offline analysis,
  reporting, or sharing income data in a spreadsheet format.


  ---


  ### Authentication


  This request inherits **Bearer token** authentication from the collection.
  Ensure a valid JWT token is set at the collection level before sending this
  request.


  ```

  Authorization: Bearer {{token}}

   ```

  ---


  ### Request


  **Method:** `GET`  

  **Endpoint:** `/api/{{version}}/download/excel-incomes`


  No request body or query parameters are required.


  ---


  ### Response


  | Status | Description |

  | --- | --- |

  | `200 OK` | Returns a binary `.xlsx` file containing all income records for
  the authenticated user. |

  | `401 Unauthorized` | Missing or invalid Bearer token. |

  | `403 Forbidden` | The token does not have permission to access this
  resource. |


  **Content-Type:**
  `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`


  The response body is a binary Excel file. Save it with a `.xlsx` extension to
  open it in a spreadsheet application such as Microsoft Excel or Google Sheets.


  ---


  ### Notes


  - The exported file includes all income records stored for the authenticated
  user's profile.
      
  - Use the `{{version}}` variable to target the correct API version (e.g.,
  `v1.0`).
      
  - Use the `{{budget-buddy-backend-development}}` variable to point to the
  correct backend environment.
url: "{{budget-buddy-backend-development}}/api/{{version}}/download/excel-incomes"
method: GET
order: 1000
